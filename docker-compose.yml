services:
  db:
    image: postgres:16-alpine
    command: ["postgres", "-p", "5431"]
    ports:
      - "5431:5431"
    environment:
      - POSTGRES_DB=wabot
      - POSTGRES_USER=wabot
      - POSTGRES_PASSWORD=${DB_PASSWORD:-wabot123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8008:8008"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5431
      - DB_NAME=wabot
      - DB_USER=wabot
      - DB_PASSWORD=${DB_PASSWORD:-wabot123}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - SUPER_ADMIN_USER=${SUPER_ADMIN_USER:-admin}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD must be set in .env}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
